name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/c4-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/c4-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - run: dotnet build --configuration Release
      - run: dotnet test --configuration Release --no-build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm test -- --run
        working-directory: web

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image names
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO_LOWER}/c4-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ env.REGISTRY }}/${REPO_LOWER}/c4-frontend" >> $GITHUB_ENV

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Host/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  provision:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      server_ip: ${{ steps.tf.outputs.public_ip }}
      server_id: ${{ steps.tf.outputs.server_id }}
      ssh_key: ${{ steps.tf.outputs.ssh_key }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: terraform-state
          path: tf-state
        continue-on-error: true

      - name: Restore Terraform state
        run: |
          if [ -f tf-state/terraform.tfstate ]; then
            cp tf-state/terraform.tfstate infra/terraform.tfstate
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Terraform Init and Apply
        id: tf
        working-directory: infra
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
        run: |
          terraform init
          terraform apply -auto-approve
          echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"
          echo "server_id=$(terraform output -raw server_id)" >> "$GITHUB_OUTPUT"
          {
            echo "ssh_key<<KEYEOF"
            terraform output -raw ssh_private_key
            echo ""
            echo "KEYEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Save Terraform state to branch
        run: |
          mkdir -p tf-state
          cp infra/terraform.tfstate tf-state/terraform.tfstate
          cd tf-state
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform.tfstate
          git diff --cached --quiet || git commit -m "Update terraform state [skip ci]"
          git push origin HEAD:terraform-state || {
            git checkout --orphan terraform-state
            git rm -rf . 2>/dev/null || true
            cp ../infra/terraform.tfstate terraform.tfstate
            git add terraform.tfstate
            git commit -m "Initial terraform state [skip ci]"
            git push origin terraform-state
          }

  deploy:
    needs: [build-and-push, provision]
    runs-on: ubuntu-latest

    steps:
      - name: Install Scaleway CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          scw version

      - name: Setup SSH from Terraform-managed key
        run: |
          mkdir -p ~/.ssh
          echo "${{ needs.provision.outputs.ssh_key }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ needs.provision.outputs.server_ip }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify server is running
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ZONE: fr-par-1
        run: |
          SERVER_ID="${{ needs.provision.outputs.server_id }}"
          scw instance server get "${SERVER_ID##*/}" -o human

      - name: Deploy
        run: |
          ssh -o ConnectTimeout=30 root@${{ needs.provision.outputs.server_ip }} bash -s \
            "${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.actor }}" \
            "${{ secrets.SCW_SECRET }}" \
            "${{ github.repository }}" \
            "${{ github.sha }}" \
            "${{ needs.provision.outputs.server_ip }}" \
            "${{ vars.DOMAIN || '' }}" <<'SCRIPT'
          set -euo pipefail
          GH_TOKEN="$1"; GH_ACTOR="$2"; DB_PASS="$3"; REPO=$(echo "$4" | tr '[:upper:]' '[:lower:]'); TAG="$5"; IP="$6"; DOMAIN="$7"
          mkdir -p /opt/c4 && cd /opt/c4

          if [ -n "$DOMAIN" ]; then
            ORIGIN="https://$DOMAIN"
          else
            ORIGIN="http://$IP"
          fi

          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

          cat > .env <<EOF
          POSTGRES_DB=c4
          POSTGRES_USER=c4
          POSTGRES_PASSWORD=$DB_PASS
          GITHUB_REPOSITORY=$REPO
          IMAGE_TAG=$TAG
          FRONTEND_ORIGIN=$ORIGIN
          EOF

          cat > docker-compose.yml <<'COMPOSE'
          services:
            postgres:
              image: postgres:17-alpine
              restart: unless-stopped
              environment:
                POSTGRES_DB: ${POSTGRES_DB}
                POSTGRES_USER: ${POSTGRES_USER}
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
              volumes:
                - pgdata:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                interval: 10s
                timeout: 5s
                retries: 5

            backend:
              image: ghcr.io/${GITHUB_REPOSITORY}/c4-backend:${IMAGE_TAG}
              restart: unless-stopped
              environment:
                ASPNETCORE_ENVIRONMENT: Production
                ASPNETCORE_URLS: http://+:5000
                ConnectionStrings__Identity: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
                ConnectionStrings__Discovery: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
                ConnectionStrings__Graph: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
                ConnectionStrings__Telemetry: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
                ConnectionStrings__Visualization: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
                ConnectionStrings__Feedback: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
                Frontend__Origin: ${FRONTEND_ORIGIN}
              ports:
                - "127.0.0.1:5000:5000"
              depends_on:
                postgres:
                  condition: service_healthy

            frontend:
              image: ghcr.io/${GITHUB_REPOSITORY}/c4-frontend:${IMAGE_TAG}
              restart: unless-stopped
              ports:
                - "127.0.0.1:3000:80"
              depends_on:
                - backend

          volumes:
            pgdata:
          COMPOSE

          docker compose pull
          docker compose up -d --remove-orphans --wait
          docker image prune -f
          echo "Deployed $TAG to $IP"
          SCRIPT
